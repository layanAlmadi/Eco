    <script>
      const choices = new Choices('[data-trigger]',
      {
        searchEnabled: false
      });
	 
  document.querySelector(".btn-search").addEventListener("click", function () {
    let searchValue = document.getElementById("search").value.trim().toLowerCase();
    let categoryValue = document.querySelector("select[name='choices-single-defaul']").value.toLowerCase();

    let pages = {
      "plastic": "plastic.html",
      "glass": "glass.html",
      "fabric": "fabric.html",
      "other": "other.html" ,
	  "metal": "other.html"
	  
    };

    if (pages[searchValue]) {
      window.location.href = pages[searchValue]; // Redirect based on search input
    } else if (pages[categoryValue]) {
      window.location.href = pages[categoryValue]; // Redirect based on selected category
    } else {
      alert("No matching category found!");
    }
  });



    </script>
