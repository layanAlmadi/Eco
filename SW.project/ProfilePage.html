<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Procss.css">
    <link rel="stylesheet"
     href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css">
    <title>Eco ProfilePage</title>


  <body>
    <header>
      <a href="#" class="logo"><img src="logo2.jpg" alt=""></a>
      <div class="bx bx-menu" id="menu-icon"></div>
      <ul class="navbar">
          <li><a href="home.html">home</a></li>
          <li><a href="home.page">Motivation</a></li>
          <li><a href="home.page">point </a></li>
          <li><a href="AddOffer">offer Recycled</a></li>
          <li><a href="find.html">Find Recycled</a></li>
          <li><a href="ProfilePage.html">Profile</a></li>
          <li><a href="#about">About us</a></li>
          <li><a href="#contact">Contact</a></li>
      </ul>
    </header>
    
    <div class="main-content">
      <div class="sidebar">
          <img src="images.png" alt="Profile Picture">
          <h3>YourName</h3>
          <a href="#" class="logout">Logout</a>
      </div>
      
      <div class="profile-container">
          <div class="profile-header">
              <img src="images.png" alt="Profile Picture">
              <div>
                  <h2>YourName</h2>
                  <p>Eco Enthusiast</p>
              </div>
              <div class="points">85</div>
          </div>
          <div class="profile-details">
              <div class="detail">
                  <label for="username">Username:</label>
                  <input type="text" id="username" value="username123">
              </div>
              <div class="detail">
                  <label for="first-name">First Name:</label>
                  <input type="text" id="first-name" value="Name">
              </div>
              <div class="detail">
                  <label for="last-name">Last Name:</label>
                  <input type="text" id="last-name" value="LastName">
              </div>
              <div class="detail">
                  <label for="age">Age:</label>
                  <input type="number" id="age" value="20">
              </div>
              <div class="detail">
                  <label for="email">Email:</label>
                  <input type="email" id="email" value="emeil@example.com">
              </div>
              <div class="detail">
                  <label for="city">City:</label>
                  <input type="text" id="city" value="Riyadh">
              </div>
              <div class="detail">
                  <label for="country">Country:</label>
                  <input type="text" id="country" value="Saudi Arabia">
              </div>
              <div class="detail">
                  <label for="phone">Phone:</label>
                  <input type="tel" id="phone" value="+966 555 123 456">
              </div>
              <div class="detail">
                  <label for="password">Password:</label>
                  <input type="password" id="password" value="********">
              </div>
          </div>
          <button class="btn">Save Changes</button>
      </div>
    </div>
    
    <section class="contact" id="contact">
        <div class="social">
            <a href="#"><i class='bx bxl-twitter'></i></a>
            <a href="#"><i class='bx bxl-instagram'></i></a>
        </div>
        <p>&#169; CarpoolVenom All Rights Reserved.</p>
    </section>
    
  </body>
  </html>
